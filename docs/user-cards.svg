    <line x1="56" y1="168" x2="284" y2="168" stroke="#e2dfd8" stroke-width="0.8"/>
    <text x="56" y="183" font-size="10" fill="#a09d97">GOAL</text>
    <text x="116" y="183" font-size="11" fill="#6b6860">Creates &amp; assigns jobs</text>
    <text x="56" y="200" font-size="10" fill="#a09d97">NEEDS</text>
