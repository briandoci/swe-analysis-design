    <rect x="754" y="619" width="60" height="15" rx="4" fill="#FCEBEB"/>
    <text x="784" y="629" text-anchor="middle" font-size="10" fill="#A32D2D">Audit reports</text>
    <text x="616" y="645" font-size="10" fill="#a09d97">PAIN</text>
    <text x="676" y="645" font-size="11" fill="#6b6860">Missing or incomplete documentation</text>
    <line x1="616" y1="656" x2="844" y2="656" stroke="#e2dfd8" stroke-width="0.8"/>
