    <rect x="458" y="619" width="60" height="15" rx="4" fill="#F1EFE8"/>
    <text x="488" y="629" text-anchor="middle" font-size="10" fill="#444441">Deploy tools</text>
    <text x="336" y="645" font-size="10" fill="#a09d97">PAIN</text>
    <text x="396" y="645" font-size="11" fill="#6b6860">Unclear cross-module error tracing</text>
    <line x1="336" y1="656" x2="564" y2="656" stroke="#e2dfd8" stroke-width="0.8"/>
